# ----------------------------------------------------
# Global Configurations
# ----------------------------------------------------
quarkus.hibernate-orm.log.sql=false
quarkus.jackson.serialization-inclusion=non-null

# JWT (Chaves geradas apenas para exemplo, em prod usar variáveis de ambiente)
mp.jwt.verify.issuer=https://feiraciencias.escola.com.br

smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH}

%dev.smallrye.jwt.sign.key.location=privateKey.pem
%dev.mp.jwt.verify.publickey.location=publicKey.pem

# Swagger UI (Disponível em /q/swagger-ui)
quarkus.swagger-ui.always-include=true

# ----------------------------------------------------
# Profile: DEV
# ----------------------------------------------------
# No Dev mode, o Quarkus vai usar Testcontainers (Dev Services) automaticamente 
# se você não configurar a URL do banco de dados! 
# Se preferir usar o seu próprio docker-compose local, descomente as linhas abaixo:
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/feira_ciencias
%dev.quarkus.datasource.username=feira_user
%dev.quarkus.datasource.password=feira_pass

%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/dev-migration
%dev.quarkus.log.console.json=false

# ----------------------------------------------------
# Profile: PROD
# ----------------------------------------------------
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASS}

%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.flyway.migrate-at-start=true

# Logging Estruturado em Produção
%prod.quarkus.log.console.json=true

# Desabilitar Swagger UI em Produção por segurança (opcional, mas recomendado)
%prod.quarkus.swagger-ui.always-include=false

# ----------------------------------------------------
# Storage Module (Supabase S3 Compatible)
# ----------------------------------------------------
%prod.storage.s3.endpoint=${S3_ENDPOINT}
%prod.storage.s3.region=${S3_REGION}
%prod.storage.s3.access-key-id=${S3_ACCESS_KEY}
%prod.storage.s3.secret-access-key=${S3_SECRET_KEY}
%prod.storage.s3.bucket=${S3_BUCKET}
%prod.storage.s3.public-url=${S3_PUBLIC_URL}

%dev.storage.s3.endpoint=http://localhost:4566
%dev.storage.s3.region=us-east-1
%dev.storage.s3.access-key-id=test
%dev.storage.s3.secret-access-key=test
%dev.storage.s3.bucket=feira-ciencias
%dev.storage.s3.public-url=http://localhost:4566/feira-ciencias

# Configurações de validação de upload
storage.upload.tipos-permitidos=image/png,image/jpeg,image/gif,image/webp,application/pdf,video/mp4
# Limite de 10 MB
storage.upload.tamanho-maximo-bytes=10485760

# ----------------------------------------------------
# Jobs
# ----------------------------------------------------
# Intervalo de execução do job de expiração de convites (padrão 1 hora)
feira-ciencias.jobs.expirar-convites.interval=1h

