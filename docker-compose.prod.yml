# Stack de produção para deploy no servidor (VPS/VM).
# A API fica exposta na rede via APP_HOST:APP_PORT (padrão 0.0.0.0:8080).
# O PostgreSQL permanece apenas na rede interna do Docker.

services:
  db:
    image: postgres:15.4-alpine
    container_name: feira_ciencias_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feira_internal

  app:
    image: ${APP_IMAGE}
    container_name: feira_ciencias_api_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: prod
      APP_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-privateKey.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-publicKey.pem}
      CORS_ENABLED: ${CORS_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    ports:
      - "${APP_HOST:-0.0.0.0}:${APP_PORT:-8080}:8080"
    networks:
      - feira_internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/q/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_prod_data:

networks:
  feira_internal:
    driver: bridge
