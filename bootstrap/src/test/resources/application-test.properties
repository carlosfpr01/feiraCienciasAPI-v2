# Configuration for CI/CD Pipeline Tests

# Database Configuration for Tests
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/feira_ciencias
quarkus.datasource.username=feira_user
quarkus.datasource.password=feira_pass

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQL15Dialect
quarkus.hibernate-orm.log.sql=false

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JWT Configuration for Tests
mp.jwt.verify.issuer=https://feiraciencias.escola.com.br
smallrye.jwt.sign.key.location=/tmp/privateKey.pem
mp.jwt.verify.publickey.location=/tmp/publicKey.pem

# Logging
quarkus.log.console.level=INFO
quarkus.log.console.json=false

# Storage (LocalStack S3 Mock)
storage.s3.endpoint=http://localhost:4566
storage.s3.region=us-east-1
storage.s3.access-key-id=test
storage.s3.secret-access-key=test
storage.s3.bucket=feira-ciencias
storage.s3.public-url=http://localhost:4566/feira-ciencias

# Upload Validation
storage.upload.tipos-permitidos=image/png,image/jpeg,image/gif,image/webp,application/pdf,video/mp4
storage.upload.tamanho-maximo-bytes=10485760

# Health Checks
quarkus.smallrye-health.enabled=true
